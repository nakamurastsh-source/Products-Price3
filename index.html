<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>価格台帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF6EC;
    --paper-deep:#F1E9D6;
    --ink:#23262B;
    --ink-soft:#6E6655;
    --indigo:#2B3A5C;
    --indigo-soft:#41538A;
    --vermillion:#BD3A2E;
    --moss:#4C7A56;
    --line:#DDD4BD;
    --line-strong:#C7BB9D;
    --radius:4px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP', sans-serif;-webkit-font-smoothing:antialiased;touch-action:manipulation;}
  .mono{font-family:'JetBrains Mono', monospace;}
  .display{font-family:'Shippori Mincho', serif;}

  /* ---------- header ---------- */
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--line-strong);background:var(--paper);position:sticky;top:0;z-index:5;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;gap:12px;align-items:center;}
  .hanko{width:42px;height:42px;background:var(--vermillion);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Shippori Mincho',serif;font-weight:700;font-size:19px;border-radius:6px;transform:rotate(-4deg);flex-shrink:0;box-shadow:inset 0 0 0 2px rgba(255,255,255,.45), 0 2px 4px rgba(0,0,0,.15);}
  .brand h1{font-family:'Shippori Mincho',serif;font-size:21px;margin:0;letter-spacing:.04em;}
  .brand p{margin:2px 0 0;font-size:11px;color:var(--ink-soft);letter-spacing:.02em;}
  .btn{border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.02em;transition:background .15s,opacity .15s;padding:9px 16px;}
  .btn:focus-visible{outline:2px solid var(--indigo-soft);outline-offset:2px;}
  .btn-primary{background:var(--indigo);color:var(--paper);}
  .btn-primary:hover{background:var(--indigo-soft);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line-strong);}
  .btn-ghost:hover{background:var(--paper-deep);}
  .btn-danger{background:var(--vermillion);color:var(--paper);}
  .btn-danger:hover{opacity:.88;}
  .btn-sm{padding:6px 12px;font-size:12px;}

  /* ---------- tabs ---------- */
  .tabbar{display:flex;max-width:1100px;margin:0 auto;padding:14px 28px 0;border-bottom:1px solid var(--line);}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 4px;margin-right:22px;font-size:13.5px;color:var(--ink-soft);cursor:pointer;font-weight:500;letter-spacing:.02em;}
  .tab-btn:hover{color:var(--ink);}
  .tab-btn.active{color:var(--ink);border-bottom-color:var(--indigo);}
  .tab-btn:focus-visible{outline:2px solid var(--indigo-soft);outline-offset:2px;}

  /* ---------- layout ---------- */
  .layout{display:flex;max-width:1100px;margin:0 auto;gap:24px;padding:24px 28px 56px;align-items:flex-start;}
  .sidebar{width:280px;flex-shrink:0;position:sticky;top:120px;max-height:calc(100vh - 144px);overflow-y:auto;border:1px solid var(--line-strong);border-radius:var(--radius);background:var(--paper);}
  .sidebar-filter{padding:10px 12px;border-bottom:1px solid var(--line);}
  .sidebar-filter select{width:100%;border:1px solid var(--line-strong);border-radius:var(--radius);padding:7px 8px;font-size:16px;background:#fff;color:var(--ink);}
  .cat-head{padding:9px 14px 5px;font-size:11px;color:var(--ink-soft);letter-spacing:.04em;background:var(--paper-deep);border-bottom:1px solid var(--line);}
  .product-item{display:flex;gap:10px;align-items:center;cursor:pointer;padding:11px 14px;border-bottom:1px solid var(--line);border-left:3px solid transparent;transition:background .12s,border-color .12s;}
  .product-item:hover{background:var(--paper-deep);}
  .product-item.active{border-left-color:var(--indigo);background:var(--paper-deep);}
  .product-item .info{flex:1;min-width:0;}
  .product-item .name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .product-item .price-line{font-size:12px;color:var(--ink-soft);margin-top:3px;}
  .sidebar-empty{padding:24px 16px;font-size:12.5px;color:var(--ink-soft);line-height:1.7;}
  .thumb-sm{width:34px;height:34px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--paper-deep);border:1px solid var(--line);}

  /* ---------- main ---------- */
  .main{flex:1;min-width:0;}
  .panel{border:1px solid var(--line-strong);border-radius:var(--radius);background:var(--paper);padding:22px 24px;}
  .empty-state{text-align:center;padding:64px 24px;color:var(--ink-soft);}
  .empty-state h2{font-family:'Shippori Mincho',serif;color:var(--ink);font-size:18px;margin:0 0 8px;}
  .empty-state p{font-size:13px;margin:0 0 20px;}

  .product-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--line-strong);padding-bottom:16px;margin-bottom:16px;gap:16px;flex-wrap:wrap;}
  .product-head-main{display:flex;gap:14px;align-items:flex-start;}
  .product-head h2{font-family:'Shippori Mincho',serif;font-size:19px;margin:0 0 6px;}
  .tag{display:inline-block;font-size:11px;color:var(--ink-soft);background:var(--paper-deep);border:1px solid var(--line-strong);border-radius:3px;padding:2px 8px;}
  .thumb-lg{width:72px;height:72px;border-radius:6px;object-fit:cover;border:1px solid var(--line-strong);background:var(--paper-deep);flex-shrink:0;cursor:pointer;}
  .thumb-placeholder{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink-soft);text-align:center;line-height:1.3;}

  .stat-row{display:flex;gap:12px;margin:0 0 20px;flex-wrap:wrap;}
  .stat-card{flex:1;min-width:150px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper-deep);padding:12px 14px;}
  .stat-card .label{font-size:11px;color:var(--ink-soft);letter-spacing:.03em;margin-bottom:6px;}
  .stat-card .value{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;}
  .stat-card .delta{font-size:11.5px;margin-top:4px;font-weight:500;}
  .delta-up{color:var(--vermillion);} .delta-down{color:var(--moss);} .delta-flat{color:var(--ink-soft);}
  .delta-up::before{content:"▲ ";} .delta-down::before{content:"▼ ";} .delta-flat::before{content:"ー ";}
  .no-record{font-size:13px;color:var(--ink-soft);}

  .chart-toggle{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .chart-toggle button{font-size:12px;padding:6px 12px;border:1px solid var(--line-strong);background:#fff;border-radius:var(--radius);cursor:pointer;color:var(--ink-soft);}
  .chart-toggle button.active{background:var(--indigo);color:var(--paper);border-color:var(--indigo);}
  .chart-wrap{border:1px solid var(--line);border-radius:var(--radius);background:#fff;padding:14px;margin-bottom:22px;}
  .chart-wrap svg{width:100%;height:auto;display:block;}
  .chart-empty{font-size:12.5px;color:var(--ink-soft);text-align:center;padding:36px 0;}

  .entry-form{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;background:var(--paper-deep);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:22px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--ink-soft);letter-spacing:.03em;}
  .field input,.field select{border:1px solid var(--line-strong);border-radius:var(--radius);padding:8px 9px;font-size:16px;font-family:'Noto Sans JP',sans-serif;background:#fff;min-width:0;}
  .field input[type="file"]{padding:6px 8px;font-size:14px;}
  .field input:focus-visible,.field select:focus-visible{outline:2px solid var(--indigo-soft);outline-offset:1px;}
  .field.date input{width:124px;font-family:'JetBrains Mono',monospace;}
  .field.maker input{width:130px;}
  .field.qty input{width:104px;font-family:'JetBrains Mono',monospace;}
  .field-duo{display:flex;flex-direction:column;gap:4px;}
  .field-duo label{font-size:11px;color:var(--ink-soft);letter-spacing:.03em;}
  .field-duo .row{display:flex;gap:5px;}
  .field-duo input{width:74px;font-family:'JetBrains Mono',monospace;font-size:16px;border:1px solid var(--line-strong);border-radius:var(--radius);padding:8px 9px;background:#fff;}
  .field-duo select{width:70px;padding:8px 4px;font-size:16px;border:1px solid var(--line-strong);border-radius:var(--radius);background:#fff;}
  .field.price input{width:96px;font-family:'JetBrains Mono',monospace;}

  .entries-title{font-size:12px;color:var(--ink-soft);letter-spacing:.04em;margin:0 0 8px;}
  .table-scroll{overflow-x:auto;}
  table.ledger{width:100%;border-collapse:collapse;min-width:480px;font-size:12.5px;}
  .ledger thead th{text-align:left;font-size:11px;color:var(--ink-soft);font-weight:500;letter-spacing:.03em;padding:6px 8px;border-bottom:1px solid var(--line-strong);white-space:nowrap;}
  .ledger tbody th{text-align:left;font-size:12px;font-weight:500;padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap;color:var(--ink-soft);}
  .ledger tbody td{padding:8px 8px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .ledger td.num,.ledger th.num{text-align:right;font-family:'JetBrains Mono',monospace;}
  .row-actions{display:flex;gap:2px;}
  .edit-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:11.5px;padding:3px 7px;border-radius:3px;transition:color .12s,background .12s;}
  .edit-btn:hover{color:var(--indigo);background:rgba(43,58,92,.08);}
  .del-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;border-radius:3px;transition:color .12s,background .12s;}
  .del-btn:hover{color:var(--vermillion);background:rgba(189,58,46,.08);}
  .product-actions{display:flex;gap:8px;flex-shrink:0;}

  /* ---------- compare ---------- */
  .compare-picker{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;}
  .compare-picker .field{flex:1;min-width:160px;}
  .compare-picker select{width:100%;}
  .compare-legend{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0 10px;font-size:12px;color:var(--ink-soft);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}

  /* ---------- entry photo gallery ---------- */
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .photo-thumb-wrap{position:relative;width:64px;height:64px;}
  .photo-thumb{width:64px;height:64px;object-fit:cover;border-radius:4px;border:1px solid var(--line-strong);display:block;background:var(--paper-deep);}
  .photo-thumb-empty{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink-soft);text-align:center;}
  .photo-thumb-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--vermillion);color:var(--paper);border:none;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
  .photo-thumb-del:hover{opacity:.85;}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,18,14,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;overflow-y:auto;}
  .modal-card{background:var(--paper);border-radius:6px;width:440px;max-width:100%;padding:22px;box-shadow:0 16px 40px rgba(0,0,0,.22);margin:auto;}
  .modal-card h3{font-family:'Shippori Mincho',serif;margin:0 0 16px;font-size:17px;}
  .modal-card .field,.modal-card .field-duo{margin-bottom:12px;}
  .modal-grid{display:flex;flex-wrap:wrap;gap:12px;}
  .modal-grid .field,.modal-grid .field-duo{flex:1;min-width:120px;}
  .modal-card .field input,.modal-card .field select{width:100%;}
  .modal-card .field-duo input{width:100%;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  .modal-msg{font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:0;}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--vermillion);color:var(--paper);font-size:12.5px;padding:10px 18px;border-radius:5px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .loading-state{padding:64px 0;text-align:center;color:var(--ink-soft);font-size:13px;}

  @media (max-width:760px){
    .topbar{padding:14px 16px;}
    .tabbar{padding:12px 16px 0;}
    .layout{flex-direction:column;padding:16px;}
    .main{width:100%;}
    .sidebar{width:100%;position:static;max-height:none;overflow-y:visible;}
    .stat-card .value{font-size:18px;}
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} }
</style>
</head>

      <div>
        <h1>価格台帳</h1>

  </div>

  <div id="modal-root"></div>
  <div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const STORAGE_KEY = 'feed-price-ledger-v1';
const FACILITY_CATEGORY = '施設・設備';
const ROUGHAGE_CATEGORY = '粗飼料';
const COLOSTRUM_CATEGORY = '初乳製剤';
const MILK_REPLACER_CATEGORY = '代用乳';
const DEFAULT_CATEGORIES = ['脂肪酸製剤','添加剤','フットバス薬剤','サイレージ調整剤','バイパス蛋白','生菌剤', ROUGHAGE_CATEGORY, COLOSTRUM_CATEGORY, MILK_REPLACER_CATEGORY, FACILITY_CATEGORY];
const CATEGORY_RENAMES = { '脂肪酸カルシウム': '脂肪酸製剤' };
const SPEC_UNITS = ['kg','g','L','mL'];
const USAGE_UNITS = ['g','kg','mL','L'];
const ROUGHAGE_FORMS = ['コンビラップ','バラ'];
const COMPARE_COLORS = ['var(--indigo)', 'var(--vermillion)', 'var(--moss)'];

function categoryType(category){
  if (category === FACILITY_CATEGORY) return 'facility';
  if (category === ROUGHAGE_CATEGORY) return 'roughage';
  return 'standard';
}
function extraFieldsFor(category){
  if (category === COLOSTRUM_CATEGORY) return 'colostrum';
  if (category === MILK_REPLACER_CATEGORY) return 'milkreplacer';
  return null;
}

/* ---------------- cloud storage (Firebase Firestore) ----------------
   GitHub Pages 等の通常のサイトでは window.storage が存在しないため、
   Firestore を使った同等の保存層をここで用意する。
   Claude のアーティファクト環境など、すでに window.storage が
   用意されている場合はそちらを優先してそのまま使う。 */
if (!window.storage){
  const firebaseConfig = {
    apiKey: "AIzaSyAsm8nf3RH5MxsPZJxoVLtfZH4cB6JNj8o",
    authDomain: "nvapp-abace.firebaseapp.com",
    projectId: "nvapp-abace",
    storageBucket: "nvapp-abace.firebasestorage.app",
    messagingSenderId: "332277746029",
    appId: "1:332277746029:web:5b1b6430170b81a3fa7264"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const FIRESTORE_COLLECTION = 'app-data';

  window.storage = {
    get: async (key, shared) => {
      const doc = await db.collection(FIRESTORE_COLLECTION).doc(key).get();
      if (!doc.exists) throw new Error('not found: ' + key);
      return { key, value: doc.data().value, shared: !!shared };
    },
    set: async (key, value, shared) => {
      await db.collection(FIRESTORE_COLLECTION).doc(key).set({
        value,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      return { key, value, shared: !!shared };
    },
    delete: async (key, shared) => {
      await db.collection(FIRESTORE_COLLECTION).doc(key).delete();
      return { key, deleted: true, shared: !!shared };
    },
    list: async (prefix, shared) => {
      const snap = await db.collection(FIRESTORE_COLLECTION).get();
      const keys = snap.docs.map(d => d.id).filter(k => !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    }
  };
}

let appData = { categories: [...DEFAULT_CATEGORIES], products: [], herdSize: null };
let selectedProductId = null;
let categoryFilter = '__all__';
let chartMetric = 'perhead';
let roughageChartMetric = 'drykgunit';
let loading = true;
let photoCache = {}; // storageKey -> dataUrl | null
let activeTab = 'detail'; // 'detail' | 'compare'
let compareSelection = [null, null, null];
let compareMetric = 'perhead';

/* ---------------- utils ---------------- */
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function todayStr(){
  const d = new Date(); const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dispDate(s){ return s ? s.replace(/-/g,'/') : ''; }
function shortDate(s){ if(!s) return ''; const p = s.split('-'); return p.length===3 ? `${p[1]}/${p[2]}` : s; }
function formatDateTime(ms){
  if (!ms) return '—';
  const d = new Date(ms);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function getLastEnteredBy(){
  try{ return localStorage.getItem('lastEnteredBy') || ''; }catch(e){ return ''; }
}
function setLastEnteredBy(name){
  try{ localStorage.setItem('lastEnteredBy', name); }catch(e){ /* ignore */ }
}
function yen(n){ return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function yenCalc(n){
  const r = Math.round(n*10)/10;
  const dec = Number.isInteger(r) ? 0 : 1;
  return '¥' + r.toLocaleString('ja-JP', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function getProduct(id){ return appData.products.find(p => p.id === id); }
function productPhotoKey(productId){ return 'productphoto:' + productId; }

function sortedEntriesDesc(p){
  return [...p.entries].sort((a,b) => {
    if (a.date !== b.date) return a.date < b.date ? 1 : -1;
    return (b.createdAt||0) - (a.createdAt||0);
  });
}
function sortedEntriesAsc(p){ return [...sortedEntriesDesc(p)].reverse(); }

/* ---------------- photo helpers ---------------- */
function readAndCompressImage(file, maxDim=900, quality=0.75){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim){
          if (width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function getPhoto(key){
  if (photoCache[key] !== undefined) return photoCache[key];
  try{
    const res = await window.storage.get(key, false);
    photoCache[key] = res ? res.value : null;
  }catch(e){
    photoCache[key] = null;
  }
  return photoCache[key];
}
function loadThumbnailsAfterRender(){
  document.querySelectorAll('img[data-photo-key]').forEach(async img => {
    const key = img.dataset.photoKey;
    const dataUrl = await getPhoto(key);
    if (dataUrl) img.src = dataUrl;
  });
}
async function deleteEntryPhotoIfAny(entry){
  if (entry && entry.photoKeys && entry.photoKeys.length){
    for (const id of entry.photoKeys){
      const key = 'photo:' + id;
      try{ await window.storage.delete(key, false); }catch(e){ /* ignore */ }
      delete photoCache[key];
    }
  }
}
async function deleteProductPhotoIfAny(product){
  if (product && product.hasPhoto){
    const key = productPhotoKey(product.id);
    try{ await window.storage.delete(key, false); }catch(e){ /* ignore */ }
    delete photoCache[key];
  }
}

/* ---------------- calculations: standard category ---------------- */
function toBase(qty, unit){
  if (unit==='kg') return {value: qty, dim:'weight'};
  if (unit==='g')  return {value: qty/1000, dim:'weight'};
  if (unit==='L')  return {value: qty, dim:'volume'};
  if (unit==='mL') return {value: qty/1000, dim:'volume'};
  return {value:null, dim:null};
}
function calcUnitPrice(e){
  const spec = toBase(e.specQty, e.specUnit);
  if (!spec.value || spec.value <= 0) return null;
  return { value: e.price / spec.value, dim: spec.dim };
}
function calcPerHead(e){
  const up = calcUnitPrice(e);
  if (!up) return null;
  const usage = toBase(e.usageQty, e.usageUnit);
  if (usage.dim !== up.dim || usage.value === null) return null;
  return up.value * usage.value;
}
function unitPriceLabel(dim){ return dim === 'volume' ? 'L単価' : '㎏単価'; }

function metricValue(e, metric){
  if (metric === 'price') return e.price;
  if (metric === 'kgunit'){ const r = calcUnitPrice(e); return r ? r.value : null; }
  if (metric === 'perhead') return calcPerHead(e);
  return null;
}
function metricDim(product){
  for (const e of product.entries){
    const r = calcUnitPrice(e);
    if (r) return r.dim;
  }
  return 'weight';
}

function herdDailyCost(perHead){
  if (perHead === null || perHead === undefined || isNaN(perHead)) return null;
  if (appData.herdSize === null || appData.herdSize === undefined || isNaN(appData.herdSize) || appData.herdSize <= 0) return null;
  return perHead * appData.herdSize;
}
function herdMonthlyCost(perHead){
  const daily = herdDailyCost(perHead);
  return daily === null ? null : daily * 30;
}

/* ---------------- calculations: roughage category ---------------- */
function roughageBasisPrice(e){
  if (e.freightPrice !== null && e.freightPrice !== undefined && !isNaN(e.freightPrice)) return e.freightPrice;
  return e.price;
}
function roughageDryWeight(e){
  if (!e.weight || e.weight <= 0) return null;
  if (e.dmPercent === null || e.dmPercent === undefined || isNaN(e.dmPercent) || e.dmPercent < 0) return null;
  return e.weight * e.dmPercent / 100;
}
function roughageUnitPrice(e){
  const basis = roughageBasisPrice(e);
  if (basis === null || basis === undefined || isNaN(basis)) return null;
  if (!e.weight || e.weight <= 0) return null;
  return basis / e.weight;
}
function roughageDryUnitPrice(e){
  const basis = roughageBasisPrice(e);
  if (basis === null || basis === undefined || isNaN(basis)) return null;
  const dw = roughageDryWeight(e);
  if (!dw || dw <= 0) return null;
  return basis / dw;
}
function roughageMetricValue(e, metric){
  if (metric === 'price') return roughageBasisPrice(e);
  if (metric === 'kgunit') return roughageUnitPrice(e);
  if (metric === 'drykgunit') return roughageDryUnitPrice(e);
  return null;
}

function compareMetricValue(e, metric){
  if (metric === 'herdday' || metric === 'herdmonth'){
    const ph = calcPerHead(e);
    if (ph === null) return null;
    return metric === 'herdday' ? herdDailyCost(ph) : herdMonthlyCost(ph);
  }
  if (metric === 'roughkgunit') return roughageUnitPrice(e);
  if (metric === 'roughdrykgunit') return roughageDryUnitPrice(e);
  return metricValue(e, metric);
}

/* ---------------- storage ---------------- */
async function loadData(){
  loading = true; render();
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if (res && res.value){
      const parsed = JSON.parse(res.value);
      appData = {
        categories: parsed.categories && parsed.categories.length ? parsed.categories : [...DEFAULT_CATEGORIES],
        products: parsed.products || [],
        herdSize: (typeof parsed.herdSize === 'number') ? parsed.herdSize : null
      };
    }
  }catch(e){
    appData = { categories: [...DEFAULT_CATEGORIES], products: [], herdSize: null };
  }
  if (!appData.categories.includes(FACILITY_CATEGORY)) appData.categories.push(FACILITY_CATEGORY);
  if (!appData.categories.includes(ROUGHAGE_CATEGORY)) appData.categories.push(ROUGHAGE_CATEGORY);
  if (!appData.categories.includes(COLOSTRUM_CATEGORY)) appData.categories.push(COLOSTRUM_CATEGORY);
  if (!appData.categories.includes(MILK_REPLACER_CATEGORY)) appData.categories.push(MILK_REPLACER_CATEGORY);
  let categoryRenamed = false;
  Object.entries(CATEGORY_RENAMES).forEach(([oldName, newName]) => {
    const idx = appData.categories.indexOf(oldName);
    if (idx !== -1){
      if (appData.categories.includes(newName)) appData.categories.splice(idx, 1);
      else appData.categories[idx] = newName;
      categoryRenamed = true;
    }
    appData.products.forEach(p => {
      if (p.category === oldName){ p.category = newName; categoryRenamed = true; }
    });
  });
  if (categoryRenamed) saveData();
  appData.products.forEach(p => {
    p.entries.forEach(e => {
      if (!e.photoKeys){
        e.photoKeys = e.photoKey ? [e.photoKey] : [];
      }
    });
  });
  if (appData.products.length > 0) selectedProductId = appData.products[0].id;
  loading = false;
  render();
}
async function saveData(){
  try{
    const res = await window.storage.set(STORAGE_KEY, JSON.stringify(appData), false);
    if (!res) showToast('保存に失敗しました。もう一度お試しください');
  }catch(e){
    showToast('保存に失敗しました。もう一度お試しください');
  }
}
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

        const tdnRaw = document.getElementById('ee-tdn').value;
        const fiberRaw = document.getElementById('ee-fiber').value;
        const ashRaw = document.getElementById('ee-ash').value;
        const animalRatioRaw = document.getElementById('ee-animal-ratio').value;

async function openEntryPhotosModal(productId, entryId){
  const product = getProduct(productId);
  if (!product) return;
  const entry = product.entries.find(e => e.id === entryId);
  if (!entry) return;
  if (!entry.photoKeys) entry.photoKeys = [];

  const photos = await Promise.all(entry.photoKeys.map(async id => ({ id, dataUrl: await getPhoto('photo:' + id) })));
  const remaining = 10 - entry.photoKeys.length;

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" id="overlay-entry-photos">
      <div class="modal-card" style="width:480px;">
        <h3>記録の写真(最大10枚)</h3>
        <div class="photo-grid" id="entry-photo-grid">
          ${photos.length === 0 ? `<p class="modal-msg">まだ写真がありません。</p>` : photos.map(p => `
            <div class="photo-thumb-wrap">
              ${p.dataUrl ? `<img src="${p.dataUrl}" class="photo-thumb" alt="記録の写真" />` : `<div class="photo-thumb photo-thumb-empty">読み込み中</div>`}
              <button class="photo-thumb-del" data-photo-id="${p.id}" title="この写真を削除">×</button>
            </div>`).join('')}
        </div>
        ${remaining > 0
          ? `<div class="field" style="margin-top:14px;">
               <label for="ep-add-photos">写真を追加(残り${remaining}枚まで)</label>
               <input id="ep-add-photos" type="file" accept="image/*" multiple />
             </div>`
          : `<p class="modal-msg" style="margin-top:14px;">上限の10枚に達しています。</p>`}
        <div class="modal-actions">
          <button class="btn btn-ghost" id="btn-close-entry-photos">閉じる</button>
        </div>
      </div>
    </div>`;

  const finishAndClose = () => { closeModal(); render(); };
  document.getElementById('btn-close-entry-photos').onclick = finishAndClose;
  document.getElementById('overlay-entry-photos').addEventListener('click', e => {
    if (e.target.id === 'overlay-entry-photos') finishAndClose();
  });

  document.querySelectorAll('#entry-photo-grid [data-photo-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.photoId;
      const key = 'photo:' + id;
      try{ await window.storage.delete(key, false); }catch(e){ /* ignore */ }
      delete photoCache[key];
      entry.photoKeys = entry.photoKeys.filter(k => k !== id);
      saveData();
      openEntryPhotosModal(productId, entryId);
    });
  });

  const addInput = document.getElementById('ep-add-photos');
  if (addInput){
    addInput.addEventListener('change', async () => {
      const slots = 10 - entry.photoKeys.length;
      const files = Array.from(addInput.files).slice(0, slots);
      for (const file of files){
        try{
          const dataUrl = await readAndCompressImage(file);
          const photoId = uid('photo');
          const res = await window.storage.set('photo:' + photoId, dataUrl, false);
          if (res){ entry.photoKeys.push(photoId); photoCache['photo:'+photoId] = dataUrl; }
          else showToast('写真の保存に失敗しました');
        }catch(err){ showToast('写真の保存に失敗しました'); }
      }
      saveData();
      openEntryPhotosModal(productId, entryId);
    });
  }
}

/* ---------------- chart (single product) ---------------- */
function buildChart(product, metric, valueFn){
  valueFn = valueFn || metricValue;
  const asc = sortedEntriesAsc(product);
  const points = asc.map(e => ({ date: e.date, value: valueFn(e, metric) }))
                     .filter(p => p.value !== null && p.value !== undefined && !isNaN(p.value));
  if (points.length === 0){
    return `<div class="chart-empty">この指標を計算できる記録がまだありません。</div>`;
  }
  const W = 640, H = 200, L = 50, R = 16, T = 16, B = 30;
  const plotW = W - L - R, plotH = H - T - B;
  const values = points.map(p => p.value);
  let min = Math.min(...values), max = Math.max(...values);
  if (min === max){ min -= Math.max(1, min*0.1); max += Math.max(1, max*0.1); }
  const range = max - min;
  const xStep = points.length > 1 ? plotW / (points.length - 1) : 0;
  const xOf = i => L + xStep * i;
  const yOf = v => T + plotH - ((v - min) / range) * plotH;

  const linePts = points.map((p,i) => `${xOf(i).toFixed(1)},${yOf(p.value).toFixed(1)}`).join(' ');
  const circles = points.map((p,i) => {
    const x = xOf(i), y = yOf(p.value);
    return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--indigo)"><title>${dispDate(p.date)}: ${Math.round(p.value*10)/10}</title></circle>`;
  }).join('');

  const grid = [0,0.5,1].map(t => {
    const y = T + plotH * t;
    const v = max - range * t;
    return `<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3,3"/>
            <text x="${L-6}" y="${y+3}" text-anchor="end" font-size="9.5" fill="var(--ink-soft)" font-family="JetBrains Mono, monospace">${Math.round(v*10)/10}</text>`;
  }).join('');

  let xLabels = '';
  if (points.length === 1){
    xLabels = `<text x="${xOf(0)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--ink-soft)">${shortDate(points[0].date)}</text>`;
  } else {
    const idxs = points.length >= 3 ? [0, Math.floor((points.length-1)/2), points.length-1] : [0, points.length-1];
    xLabels = [...new Set(idxs)].map(i =>
      `<text x="${xOf(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--ink-soft)">${shortDate(points[i].date)}</text>`
    ).join('');
  }

  const polyline = points.length > 1
    ? `<polyline points="${linePts}" fill="none" stroke="var(--indigo)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`
    : '';

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${polyline}${circles}${xLabels}</svg>`;
}

/* ---------------- chart (compare multiple products, bar chart) ---------------- */
function truncateName(name, max){
  max = max || 9;
  return name.length > max ? name.slice(0, max - 1) + '…' : name;
}
function buildCompareBarChart(items, metric){
  const data = items.map(it => {
    const latest = sortedEntriesDesc(it.product)[0];
    const raw = latest ? compareMetricValue(latest, metric) : null;
    const value = (raw !== null && raw !== undefined && !isNaN(raw)) ? raw : null;
    return { product: it.product, color: it.color, value };
  });

  if (data.every(d => d.value === null)){
    return `<div class="chart-empty">この指標を計算できる記録がまだありません。</div>`;
  }

  const W = 640, H = 260, L = 56, R = 20, T = 20, B = 56;
  const plotW = W - L - R, plotH = H - T - B;
  const values = data.filter(d => d.value !== null).map(d => d.value);
  let maxV = Math.max(...values, 0);
  if (maxV === 0) maxV = 1;
  const scaleMax = maxV * 1.18;

  const n = data.length;
  const slotW = plotW / n;
  const barW = Math.min(86, slotW * 0.46);

  const grid = [0,0.5,1].map(f => {
    const y = T + plotH * (1 - f);
    const v = scaleMax * f;
    return `<line x1="${L}" y1="${y.toFixed(1)}" x2="${W-R}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="3,3"/>
            <text x="${L-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9.5" fill="var(--ink-soft)" font-family="JetBrains Mono, monospace">${Math.round(v*10)/10}</text>`;
  }).join('');

  const bars = data.map((d,i) => {
    const cx = L + slotW * i + slotW / 2;
    const nameLabel = `<text x="${cx.toFixed(1)}" y="${H-14}" text-anchor="middle" font-size="11" fill="var(--ink-soft)"><title>${escapeHtml(d.product.name)}</title>${escapeHtml(truncateName(d.product.name))}</text>`;
    if (d.value === null){
      return `<text x="${cx.toFixed(1)}" y="${(T+plotH-6).toFixed(1)}" text-anchor="middle" font-size="11" fill="var(--ink-soft)">—</text>${nameLabel}`;
    }
    const barH = Math.max(2, (d.value / scaleMax) * plotH);
    const x = cx - barW / 2;
    const y = T + plotH - barH;
    return `
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="3" fill="${d.color}">
        <title>${escapeHtml(d.product.name)}: ${Math.round(d.value*10)/10}</title>
      </rect>
      <text x="${cx.toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="11" fill="var(--ink)" font-family="JetBrains Mono, monospace">${Math.round(d.value*10)/10}</text>
      ${nameLabel}`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${bars}</svg>`;
}

  renderTabs();
  if (activeTab === 'compare'){
    document.getElementById('sidebar').style.display = 'none';
    renderCompare();
  } else {
    document.getElementById('sidebar').style.display = '';
    renderSidebar();
    renderMain();
  }
  loadThumbnailsAfterRender();
}

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === activeTab);
  });
}

function renderSidebar(){
  const el = document.getElementById('sidebar');
  if (loading){ el.innerHTML = `<div class="sidebar-empty">読み込み中…</div>`; return; }

  const filterOptions = `<option value="__all__">すべての種類</option>` +
    appData.categories.map(c => `<option value="${escapeHtml(c)}" ${c===categoryFilter?'selected':''}>${escapeHtml(c)}</option>`).join('');

  if (appData.products.length === 0){
    el.innerHTML = `
      <div class="sidebar-filter"><select id="sidebar-cat-filter">${filterOptions}</select></div>
      <div class="sidebar-empty">製品を追加すると、ここに一覧が表示されます。</div>`;
    return;
  }

  const filtered = appData.products.filter(p => categoryFilter === '__all__' || p.category === categoryFilter);
  let body;
  if (filtered.length === 0){
    body = `<div class="sidebar-empty">この種類の製品はありません。</div>`;
  } else {
    const groups = [];
    const order = categoryFilter === '__all__' ? appData.categories : [categoryFilter];
    for (const cat of order){
      const items = filtered.filter(p => p.category === cat);
      if (items.length === 0) continue;
      groups.push(`<div class="cat-head">${escapeHtml(cat)}・${items.length}件</div>` + items.map(p => {
        const desc = sortedEntriesDesc(p);
        const latest = desc[0];
        const priceLabel = latest ? yen(latest.price) : '記録なし';
        return `
          <div class="product-item ${p.id === selectedProductId ? 'active' : ''}" data-action="select-product" data-id="${p.id}">

              <div class="name">${escapeHtml(p.name)}</div>
              <div class="price-line mono">${priceLabel}</div>
            </div>
          </div>`;
      }).join(''));
    }
    body = groups.join('');
  }

  el.innerHTML = `<div class="sidebar-filter"><select id="sidebar-cat-filter">${filterOptions}</select></div>${body}`;

      const usageQty = parseFloat(document.getElementById('f-usage-qty').value);
      if (isNaN(specQty) || specQty <= 0 || isNaN(price) || price < 0 || isNaN(usageQty) || usageQty < 0){
        showToast('規格・価格・使用量を正しく入力してください'); return;
      }
      const enteredBy = document.getElementById('f-entered-by').value.trim();
      if (!enteredBy){ showToast('入力者名を入力してください'); return; }
      const newEntry = {
        id: uid('entry'),
        date: document.getElementById('f-date').value || todayStr(),
        manufacturer: document.getElementById('f-maker').value.trim(),
        specQty, specUnit: document.getElementById('f-spec-unit').value,
        price,
        usageQty, usageUnit: document.getElementById('f-usage-unit').value,
        enteredBy,
        createdAt: Date.now()
      };
      const extra = extraFieldsFor(product.category);
      if (extra === 'colostrum'){
        const iggRaw = document.getElementById('f-igg').value;
        newEntry.igg = iggRaw === '' ? null : parseFloat(iggRaw);
      } else if (extra === 'milkreplacer'){
        const cpRaw = document.getElementById('f-cp').value;
        const fatRaw = document.getElementById('f-fat').value;
        const tdnRaw = document.getElementById('f-tdn').value;
        const fiberRaw = document.getElementById('f-fiber').value;
        const ashRaw = document.getElementById('f-ash').value;
        const animalRatioRaw = document.getElementById('f-animal-ratio').value;
        newEntry.cp = cpRaw === '' ? null : parseFloat(cpRaw);
        newEntry.fat = fatRaw === '' ? null : parseFloat(fatRaw);
        newEntry.tdn = tdnRaw === '' ? null : parseFloat(tdnRaw);
        newEntry.fiber = fiberRaw === '' ? null : parseFloat(fiberRaw);
        newEntry.ash = ashRaw === '' ? null : parseFloat(ashRaw);
        newEntry.animalRatio = animalRatioRaw === '' ? null : parseFloat(animalRatioRaw);
      }
      product.entries.push(newEntry);
      setLastEnteredBy(enteredBy);
      saveData(); render();
    });
    document.querySelectorAll('[data-metric]').forEach(btn => {
      btn.addEventListener('click', () => { chartMetric = btn.dataset.metric; render(); });
    });
  }
}

function renderCompare(){
  const el = document.getElementById('main');
  if (loading){ el.innerHTML = `<div class="panel"><div class="loading-state">読み込み中…</div></div>`; return; }

  if (appData.products.length === 0){
    el.innerHTML = `
      <div class="panel">
        <h2 class="display" style="font-size:19px;margin:0 0 4px;">製品比較</h2>
        <div class="empty-state"><h2>比較できる製品がありません</h2><p>まず製品を追加してください。</p></div>
      </div>`;
    return;
  }

  function productOptionsHtml(selectedId, excludeIds){
    let html = `<option value="">(未選択)</option>`;
    for (const cat of appData.categories){
      const items = appData.products.filter(p => p.category === cat && (p.id === selectedId || !excludeIds.includes(p.id)));
      if (items.length === 0) continue;
      html += `<optgroup label="${escapeHtml(cat)}">` + items.map(p =>
        `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${escapeHtml(p.name)}</option>`
      ).join('') + `</optgroup>`;
    }
    return html;
  }

  const pickerHtml = [0,1,2].map(i => {
    const excludeIds = compareSelection.filter((id, idx) => idx !== i && id);
    return `
      <div class="field">
        <label for="cmp-select-${i}">比較する製品${i+1}</label>
        <select id="cmp-select-${i}" data-slot="${i}">${productOptionsHtml(compareSelection[i], excludeIds)}</select>
      </div>`;
  }).join('');

  const selectedProducts = compareSelection.map(id => id ? getProduct(id) : null);
  const items = compareSelection.map((id, i) => id ? { product: getProduct(id), color: COMPARE_COLORS[i] } : null).filter(Boolean);

  let bodyHtml;
  if (items.length === 0){
    bodyHtml = `<p class="no-record" style="margin-top:18px;">比較する製品を選んでください(最大3つ)。</p>`;
  } else {
    function tdFor(fn){
      return selectedProducts.map(p => {
        if (!p) return `<td class="num">—</td>`;
        const latest = sortedEntriesDesc(p)[0];
        if (!latest) return `<td class="num">—</td>`;
        return `<td class="num">${fn(p, latest)}</td>`;
      }).join('');
    }
    const headerRow = `<tr><th></th>${selectedProducts.map(p => `<th>${p ? escapeHtml(p.name) : '(未選択)'}</th>`).join('')}</tr>`;
    const catRow = `<tr><th>種類</th>${selectedProducts.map(p => `<td>${p ? `<span class="tag">${escapeHtml(p.category)}</span>` : '—'}</td>`).join('')}</tr>`;
    const priceRow = `<tr><th>直近の価格</th>${tdFor((p,e) => yen(e.price))}</tr>`;
    const specRow = `<tr><th>規格</th>${tdFor((p,e) => (e.specQty !== undefined && e.specQty !== null) ? `${e.specQty}${e.specUnit}` : '—')}</tr>`;
    const kguRow = `<tr><th>単価</th>${tdFor((p,e) => { const r = calcUnitPrice(e); return r ? yenCalc(r.value) + '/' + (r.dim==='volume'?'L':'㎏') : '—'; })}</tr>`;
    const usageRow = `<tr><th>使用量(日/頭)</th>${tdFor((p,e) => (e.usageQty !== undefined && e.usageQty !== null) ? `${e.usageQty}${e.usageUnit}` : '—')}</tr>`;
    const perHeadRow = `<tr><th>一頭あたり単価(日)</th>${tdFor((p,e) => { const ph = calcPerHead(e); return ph !== null ? yenCalc(ph) + '/日' : '—'; })}</tr>`;
    const herdDayRow = `<tr><th>牛群1日コスト</th>${tdFor((p,e) => { const v = herdDailyCost(calcPerHead(e)); return v !== null ? yenCalc(v) + '/日' : '—'; })}</tr>`;
    const herdMonthRow = `<tr><th>牛群1か月コスト</th>${tdFor((p,e) => { const v = herdMonthlyCost(calcPerHead(e)); return v !== null ? yenCalc(v) + '/月' : '—'; })}</tr>`;
    const roughFormRow = `<tr><th>形態(粗飼料)</th>${tdFor((p,e) => e.form ? escapeHtml(e.form) : '—')}</tr>`;
    const roughKguRow = `<tr><th>㎏単価(粗飼料)</th>${tdFor((p,e) => { const v = roughageUnitPrice(e); return v !== null ? yenCalc(v) : '—'; })}</tr>`;
    const roughDryKguRow = `<tr><th>乾物㎏単価(粗飼料)</th>${tdFor((p,e) => { const v = roughageDryUnitPrice(e); return v !== null ? yenCalc(v) : '—'; })}</tr>`;

    bodyHtml = `
      <div class="table-scroll" style="margin-top:18px;">
        <table class="ledger">
          <thead>${headerRow}</thead>
          <tbody>${catRow}${priceRow}${specRow}${kguRow}${usageRow}${perHeadRow}${herdDayRow}${herdMonthRow}${roughFormRow}${roughKguRow}${roughDryKguRow}</tbody>
        </table>
      </div>

      <div class="chart-toggle" style="margin-top:22px;">
        <button data-cmp-metric="price" class="${compareMetric==='price'?'active':''}">価格</button>
        <button data-cmp-metric="kgunit" class="${compareMetric==='kgunit'?'active':''}">単価(㎏/L)</button>
        <button data-cmp-metric="perhead" class="${compareMetric==='perhead'?'active':''}">一頭あたり単価(日)</button>
        <button data-cmp-metric="herdday" class="${compareMetric==='herdday'?'active':''}">牛群1日コスト</button>
        <button data-cmp-metric="herdmonth" class="${compareMetric==='herdmonth'?'active':''}">牛群1か月コスト</button>
        <button data-cmp-metric="roughkgunit" class="${compareMetric==='roughkgunit'?'active':''}">㎏単価(粗飼料)</button>
        <button data-cmp-metric="roughdrykgunit" class="${compareMetric==='roughdrykgunit'?'active':''}">乾物㎏単価(粗飼料)</button>
      </div>
      <div class="chart-wrap">${buildCompareBarChart(items, compareMetric)}</div>`;
  }

  el.innerHTML = `
    <div class="panel">
      <h2 class="display" style="font-size:19px;margin:0 0 4px;">製品比較</h2>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 16px;">最大3つの製品を選んで、単価や一頭あたりのコストを比べられます。</p>
      <div class="compare-picker" style="margin-bottom:14px;">
        <div class="field" style="max-width:180px;">
          <label for="cmp-herd-size">経産牛頭数(頭)</label>
          <input id="cmp-herd-size" type="number" min="0" step="1" value="${appData.herdSize !== null && appData.herdSize !== undefined ? appData.herdSize : ''}" placeholder="例: 50" />
        </div>
      </div>
      <p style="font-size:11.5px;color:var(--ink-soft);margin:-8px 0 14px;">入力すると、牛群全体の1日・1か月あたりのコストを計算します。</p>
      <div class="compare-picker">${pickerHtml}</div>
      ${bodyHtml}
    </div>`;

  document.getElementById('cmp-herd-size').addEventListener('change', e => {
    const v = parseFloat(e.target.value);
    appData.herdSize = (e.target.value === '' || isNaN(v) || v < 0) ? null : v;
    saveData(); render();
  });

  [0,1,2].forEach(i => {
    document.getElementById('cmp-select-'+i).addEventListener('change', e => {
      compareSelection[i] = e.target.value || null;
      render();
    });
  });
  document.querySelectorAll('[data-cmp-metric]').forEach(btn => {
    btn.addEventListener('click', () => { compareMetric = btn.dataset.cmpMetric; render(); });
  });
}

/* ---------------- event delegation ---------------- */
document.getElementById('sidebar').addEventListener('click', e => {
  const item = e.target.closest('[data-action="select-product"]');
  if (item){ selectedProductId = item.dataset.id; render(); }
});

document.getElementById('main').addEventListener('click', e => {
  const editProduct = e.target.closest('[data-action="edit-product"]');
  if (editProduct){ openEditProductModal(editProduct.dataset.id); return; }

  const editEntry = e.target.closest('[data-action="edit-entry"]');
  if (editEntry){ openEditEntryModal(editEntry.dataset.product, editEntry.dataset.id); return; }

  const managePhoto = e.target.closest('[data-action="manage-photo"]');
  if (managePhoto){ openProductPhotoModal(managePhoto.dataset.id); return; }

  const manageEntryPhotos = e.target.closest('[data-action="manage-entry-photos"]');
  if (manageEntryPhotos){ openEntryPhotosModal(manageEntryPhotos.dataset.product, manageEntryPhotos.dataset.id); return; }

  const delEntry = e.target.closest('[data-action="delete-entry"]');
  if (delEntry){
    const product = getProduct(selectedProductId);
    openConfirmModal('記録を削除', 'この価格の記録を削除します。元に戻せません。', '削除する', () => {
      const entry = product.entries.find(en => en.id === delEntry.dataset.id);
      product.entries = product.entries.filter(en => en.id !== delEntry.dataset.id);
      saveData(); render();
      deleteEntryPhotoIfAny(entry);
    });
    return;
  }
  const delProduct = e.target.closest('[data-action="delete-product"]');
  if (delProduct){
    const product = getProduct(delProduct.dataset.id);
    openConfirmModal('製品を削除', `「${product.name}」と、すべての価格記録を削除します。元に戻せません。`, '削除する', () => {
      appData.products = appData.products.filter(p => p.id !== delProduct.dataset.id);
      if (selectedProductId === delProduct.dataset.id){
        selectedProductId = appData.products.length ? appData.products[0].id : null;
      }
      compareSelection = compareSelection.map(id => id === delProduct.dataset.id ? null : id);
      saveData(); render();
      product.entries.forEach(en => deleteEntryPhotoIfAny(en));
      deleteProductPhotoIfAny(product);
    });
  }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => { activeTab = btn.dataset.tab; render(); });
});

document.getElementById('btn-open-add-product').addEventListener('click', openAddProductModal);

/* ---------------- init ---------------- */
loadData();
</script>
</body>
</html>
